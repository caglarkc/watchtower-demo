[pytest]
markers =
    phase1: Phase 1 base LAN feature tests
    phase2: Phase 2 mail/application feature tests
    phase3: Phase 3 AI/HR/proxy feature tests
    smoke: Container and stack smoke tests
    integration: Cross-service integration tests
    scenario: Phase 4 scenario replay tests
    coverage_gate: Final 81-feature coverage gate
    real: Real integration parity tests (RI-0+)
testpaths = tests
