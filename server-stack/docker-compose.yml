# Watchtower closed server simulation — Phase 1 + Phase 2
# All services attach to corp-lan with static IPv4 assignments.

name: watchtower-corp

networks:
  corp-lan:
    driver: bridge
    ipam:
      config:
        - subnet: ${CORP_LAN_SUBNET:-172.28.0.0/24}

volumes:
  samba-ad-data:
  samba-files-data:
  bind-cache:
  dhcp-leases:
  es-data:
  corp-logs:
  postgres-data:
  gitea-data:

x-health-http: &health-http
  interval: 15s
  timeout: 5s
  retries: 8
  start_period: 30s

services:
  samba-ad:
    build:
      context: ./docker/samba-ad-sim
    container_name: corp-samba-ad
    hostname: dc1
    networks:
      corp-lan:
        ipv4_address: ${SAMBA_AD_IP:-172.28.0.10}
    environment:
      DOMAIN: ${DOMAIN:-corp.local}
      LOG_ROOT: /var/log/corp/identity
    volumes:
      - ./logs/identity:/var/log/corp/identity
      - ./configs/samba/ad:/etc/samba/external:ro
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  # Optional full Samba4 DC (heavy; enable with: docker compose --profile real-ad up -d)
  samba-ad-real:
    profiles: ["real-ad"]
    image: nowsci/samba-domain:latest
    container_name: corp-samba-ad-real
    hostname: dc1-real
    networks:
      corp-lan:
        ipv4_address: 172.28.0.19
    environment:
      DOMAIN: ${DOMAIN:-corp.local}
      DOMAINPASS: ${ADMIN_PASSWORD:-Watchtower1!}
      DNSFORWARDER: ${DNS_FORWARDER:-1.1.1.1}
    volumes:
      - samba-ad-data:/var/lib/samba
    privileged: true
    restart: unless-stopped

  samba-files:
    image: dperson/samba:latest
    container_name: corp-samba-files
    hostname: files1
    networks:
      corp-lan:
        ipv4_address: ${SAMBA_FILES_IP:-172.28.0.11}
    environment:
      TZ: UTC
    volumes:
      - samba-files-data:/share
      - ./logs/samba:/var/log/corp/samba
      - ./configs/samba/files:/etc/samba/external:ro
    command: >
      -s "Finance;/share/finance;yes;no;no;all;none;none"
      -s "HR;/share/hr;yes;no;no;all;none;none"
      -s "Legal;/share/legal;yes;no;no;all;none;none"
      -s "Dev;/share/dev;yes;no;no;all;none;none"
      -u "svc_sql;Watchtower1!"
      -u "cfo;Watchtower1!"
      -p
    healthcheck:
      test: ["CMD-SHELL", "smbd -V >/dev/null 2>&1 || exit 1"]
      <<: *health-http
    restart: unless-stopped

  bind-dns:
    image: ubuntu/bind9:9.18-22.04_edge
    container_name: corp-bind-dns
    hostname: dns1
    networks:
      corp-lan:
        ipv4_address: ${BIND_DNS_IP:-172.28.0.12}
    volumes:
      - ./configs/bind/named.conf:/etc/bind/named.conf:ro
      - ./configs/bind/zones:/etc/bind/zones:ro
      - bind-cache:/var/cache/bind
      - ./logs/dns:/var/log/corp/dns
    healthcheck:
      test: ["CMD-SHELL", "named-checkconf /etc/bind/named.conf && pgrep named"]
      <<: *health-http
    restart: unless-stopped

  dhcp-server:
    image: networkboot/dhcpd:latest
    container_name: corp-dhcp
    hostname: dhcp1
    networks:
      corp-lan:
        ipv4_address: ${DHCP_SERVER_IP:-172.28.0.13}
    volumes:
      - ./configs/dhcp/dhcpd.conf:/data/dhcpd.conf:ro
      - dhcp-leases:/data/leases
      - ./logs/dhcp:/var/log/corp/dhcp
    environment:
      DHCPD_IFACE: eth0
    healthcheck:
      test: ["CMD-SHELL", "pgrep dhcpd || exit 1"]
      <<: *health-http
    restart: unless-stopped

  zeek-synthetic:
    build:
      context: ./docker/zeek-synthetic
    container_name: corp-zeek-synthetic
    hostname: zeek1
    networks:
      corp-lan:
        ipv4_address: ${ZEEK_SYNTHETIC_IP:-172.28.0.14}
    volumes:
      - corp-logs:/var/log/corp
      - ./logs/zeek:/var/log/corp/zeek
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  endpoint-synthetic:
    build:
      context: ./docker/endpoint-synthetic
    container_name: corp-endpoint-synthetic
    hostname: endpoint1
    networks:
      corp-lan:
        ipv4_address: ${ENDPOINT_SYNTHETIC_IP:-172.28.0.15}
    volumes:
      - corp-logs:/var/log/corp
      - ./logs/endpoint:/var/log/corp/endpoint
    environment:
      LOG_ROOT: /var/log/corp/endpoint
      DOMAIN: ${DOMAIN:-corp.local}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      <<: *health-http
    restart: unless-stopped

  log-pipeline:
    build:
      context: ./docker/log-pipeline
    container_name: corp-log-pipeline
    hostname: logs1
    networks:
      corp-lan:
        ipv4_address: ${LOG_PIPELINE_IP:-172.28.0.16}
    volumes:
      - corp-logs:/var/log/corp
      - ./logs:/var/log/corp/host
    depends_on:
      zeek-synthetic:
        condition: service_healthy
      endpoint-synthetic:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9201/health"]
      <<: *health-http
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: corp-elasticsearch
    hostname: es1
    networks:
      corp-lan:
        ipv4_address: ${ELASTICSEARCH_IP:-172.28.0.17}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      cluster.name: corp-logs
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  replay-runner:
    build:
      context: .
      dockerfile: docker/replay-runner/Dockerfile
    container_name: corp-replay-runner
    hostname: replay1
    profiles: ["tools"]
    networks:
      corp-lan:
        ipv4_address: ${REPLAY_RUNNER_IP:-172.28.0.18}
    volumes:
      - .:/workspace:ro
      - ./reports:/workspace/reports
      - ./logs:/workspace/logs
      - corp-logs:/var/log/corp
    working_dir: /workspace
    entrypoint: ["sleep", "infinity"]
