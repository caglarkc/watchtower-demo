# Watchtower closed server simulation — Phase 1 + 2 + 3
# All services attach to corp-lan with static IPv4 assignments.

name: watchtower-corp

networks:
  corp-lan:
    driver: bridge
    ipam:
      config:
        - subnet: ${CORP_LAN_SUBNET:-172.28.0.0/24}

volumes:
  samba-ad-data:
  samba-files-data:
  bind-cache:
  dhcp-leases:
  es-data:
  corp-logs:
  postgres-data:
  gitea-data:

x-health-http: &health-http
  interval: 15s
  timeout: 5s
  retries: 8
  start_period: 30s

services:
  samba-ad:
    build:
      context: ./docker/samba-ad-sim
    container_name: corp-samba-ad
    hostname: dc1
    networks:
      corp-lan:
        ipv4_address: ${SAMBA_AD_IP:-172.28.0.10}
    environment:
      DOMAIN: ${DOMAIN:-corp.local}
      LOG_ROOT: /var/log/corp/identity
    volumes:
      - ./logs/identity:/var/log/corp/identity
      - ./configs/samba/ad:/etc/samba/external:ro
    healthcheck:
      test: ["CMD-SHELL", "python /app/healthcheck.py && curl -sf http://127.0.0.1:8080/health"]
      <<: *health-http
    restart: unless-stopped

  # Optional full Samba4 DC (heavy; enable with: docker compose --profile real-ad up -d)
  samba-ad-real:
    profiles: ["real-ad"]
    image: nowsci/samba-domain:latest
    container_name: corp-samba-ad-real
    hostname: dc1-real
    networks:
      corp-lan:
        ipv4_address: 172.28.0.19
    environment:
      DOMAIN: ${DOMAIN:-corp.local}
      DOMAINPASS: ${ADMIN_PASSWORD:-Watchtower1!}
      DNSFORWARDER: ${DNS_FORWARDER:-1.1.1.1}
    volumes:
      - samba-ad-data:/var/lib/samba
    privileged: true
    restart: unless-stopped

  samba-files:
    image: dperson/samba:latest
    container_name: corp-samba-files
    hostname: files1
    networks:
      corp-lan:
        ipv4_address: ${SAMBA_FILES_IP:-172.28.0.11}
    environment:
      TZ: UTC
    volumes:
      - samba-files-data:/share
      - ./logs/samba:/var/log/corp/samba
      - ./configs/samba/files:/etc/samba/external:ro
    command: >
      -s "Finance;/share/finance;yes;no;no;all;none;none"
      -s "HR;/share/hr;yes;no;no;all;none;none"
      -s "Legal;/share/legal;yes;no;no;all;none;none"
      -s "Dev;/share/dev;yes;no;no;all;none;none"
      -u "svc_sql;Watchtower1!"
      -u "cfo;Watchtower1!"
      -p
    healthcheck:
      test: ["CMD-SHELL", "smbd -V >/dev/null 2>&1 || exit 1"]
      <<: *health-http
    restart: unless-stopped

  bind-dns:
    image: ubuntu/bind9:9.18-22.04_edge
    container_name: corp-bind-dns
    hostname: dns1
    networks:
      corp-lan:
        ipv4_address: ${BIND_DNS_IP:-172.28.0.12}
    volumes:
      - ./configs/bind/named.conf:/etc/bind/named.conf:ro
      - ./configs/bind/zones:/etc/bind/zones:ro
      - bind-cache:/var/cache/bind
      - ./logs/dns:/var/log/corp/dns
    healthcheck:
      test: ["CMD-SHELL", "named-checkconf /etc/bind/named.conf && pgrep named"]
      <<: *health-http
    restart: unless-stopped

  dhcp-server:
    image: networkboot/dhcpd:latest
    container_name: corp-dhcp
    hostname: dhcp1
    networks:
      corp-lan:
        ipv4_address: ${DHCP_SERVER_IP:-172.28.0.13}
    volumes:
      - ./configs/dhcp/dhcpd.conf:/data/dhcpd.conf:ro
      - dhcp-leases:/data/leases
      - ./logs/dhcp:/var/log/corp/dhcp
    environment:
      DHCPD_IFACE: eth0
    healthcheck:
      test: ["CMD-SHELL", "pgrep dhcpd || exit 1"]
      <<: *health-http
    restart: unless-stopped

  zeek-synthetic:
    build:
      context: ./docker/zeek-synthetic
    container_name: corp-zeek-synthetic
    hostname: zeek1
    networks:
      corp-lan:
        ipv4_address: ${ZEEK_SYNTHETIC_IP:-172.28.0.14}
    volumes:
      - corp-logs:/var/log/corp
      - ./logs/zeek:/var/log/corp/zeek
    healthcheck:
      test: ["CMD-SHELL", "python /app/healthcheck.py && curl -sf http://127.0.0.1:8080/health"]
      <<: *health-http
    restart: unless-stopped

  # RI-1: real Samba file actions + full_audit log path
  samba-files-actions:
    profiles: ["real-identity"]
    build:
      context: ./docker/samba-files-actions
    container_name: corp-samba-files-actions
    hostname: files-actions
    networks:
      corp-lan:
        ipv4_address: ${SAMBA_FILES_ACTIONS_IP:-172.28.0.42}
    environment:
      SAMBA_HOST: corp-samba-files
      SAMBA_USER: cfo
      SAMBA_PASS: ${ADMIN_PASSWORD:-Watchtower1!}
      LOG_ROOT: /var/log/corp/samba
      SEED_ROOT: /seeds
    volumes:
      - ./logs/samba:/var/log/corp/samba
      - ./seeds/real/files:/seeds:ro
    depends_on:
      samba-files:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python /app/healthcheck.py && curl -sf http://127.0.0.1:8080/health"]
      <<: *health-http
    restart: unless-stopped

  # RI-1: DHCP/Kea-style lease log API (complements ISC dhcp-server)
  dhcp-logger:
    profiles: ["real-identity"]
    build:
      context: ./docker/dhcp-logger
    container_name: corp-dhcp-logger
    hostname: dhcp-logger
    networks:
      corp-lan:
        ipv4_address: ${DHCP_LOGGER_IP:-172.28.0.43}
    volumes:
      - ./logs/dhcp:/var/log/corp/dhcp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health"]
      <<: *health-http
    restart: unless-stopped

  endpoint-synthetic:
    build:
      context: ./docker/endpoint-synthetic
    container_name: corp-endpoint-synthetic
    hostname: endpoint1
    networks:
      corp-lan:
        ipv4_address: ${ENDPOINT_SYNTHETIC_IP:-172.28.0.15}
    volumes:
      - corp-logs:/var/log/corp
      - ./logs/endpoint:/var/log/corp/endpoint
    environment:
      LOG_ROOT: /var/log/corp/endpoint
      DOMAIN: ${DOMAIN:-corp.local}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      <<: *health-http
    restart: unless-stopped

  log-pipeline:
    build:
      context: ./docker/log-pipeline
    container_name: corp-log-pipeline
    hostname: logs1
    networks:
      corp-lan:
        ipv4_address: ${LOG_PIPELINE_IP:-172.28.0.16}
    volumes:
      - corp-logs:/var/log/corp
      - ./logs:/var/log/corp/host
    depends_on:
      zeek-synthetic:
        condition: service_healthy
      endpoint-synthetic:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9201/health"]
      <<: *health-http
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: corp-elasticsearch
    hostname: es1
    networks:
      corp-lan:
        ipv4_address: ${ELASTICSEARCH_IP:-172.28.0.17}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      cluster.name: corp-logs
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  replay-runner:
    build:
      context: .
      dockerfile: docker/replay-runner/Dockerfile
    container_name: corp-replay-runner
    hostname: replay1
    profiles: ["tools"]
    networks:
      corp-lan:
        ipv4_address: ${REPLAY_RUNNER_IP:-172.28.0.18}
    volumes:
      - .:/workspace:ro
      - ./reports:/workspace/reports
      - ./logs:/workspace/logs
      - corp-logs:/var/log/corp
    working_dir: /workspace
    entrypoint: ["sleep", "infinity"]

  # --- Phase 2: Mail ---
  postfix:
    build:
      context: ./docker/mail-sim
    container_name: corp-postfix
    hostname: mail1
    networks:
      corp-lan:
        ipv4_address: ${POSTFIX_IP:-172.28.0.20}
    environment:
      ROLE: postfix
      LOG_ROOT: /var/log/corp/postfix
    volumes:
      - ./logs/postfix:/var/log/corp/postfix
      - ./configs/postfix:/etc/postfix/external:ro
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  dovecot:
    build:
      context: ./docker/mail-sim
    container_name: corp-dovecot
    hostname: imap1
    networks:
      corp-lan:
        ipv4_address: ${DOVECOT_IP:-172.28.0.21}
    environment:
      ROLE: dovecot
      LOG_ROOT: /var/log/corp/dovecot
    volumes:
      - ./logs/dovecot:/var/log/corp/dovecot
      - ./configs/dovecot:/etc/dovecot/external:ro
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  roundcube:
    build:
      context: ./docker/mail-sim
    container_name: corp-roundcube
    hostname: webmail1
    networks:
      corp-lan:
        ipv4_address: ${ROUNDCUBE_IP:-172.28.0.22}
    environment:
      ROLE: roundcube
      LOG_ROOT: /var/log/corp/roundcube
    volumes:
      - ./logs/roundcube:/var/log/corp/roundcube
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  # --- Phase 2: Database ---
  postgres:
    image: postgres:16-alpine
    container_name: corp-postgres
    hostname: db1
    networks:
      corp-lan:
        ipv4_address: ${POSTGRES_IP:-172.28.0.23}
    environment:
      POSTGRES_USER: corp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Watchtower1!}
      POSTGRES_DB: corpdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./logs/postgres:/var/log/corp/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corp -d corpdb"]
      <<: *health-http
    restart: unless-stopped

  # --- Phase 2: Git ---
  gitea:
    image: gitea/gitea:1.21-rootless
    container_name: corp-gitea
    hostname: git1
    networks:
      corp-lan:
        ipv4_address: ${GITEA_IP:-172.28.0.24}
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: http://git1.corp.local:3000/
      GITEA__server__HTTP_PORT: 3000
      GITEA__log__ROOT_PATH: /var/log/corp/gitea
    volumes:
      - gitea-data:/var/lib/gitea
      - ./logs/gitea:/var/log/corp/gitea
      - ./configs/gitea:/etc/gitea/external:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/api/healthz || exit 1"]
      <<: *health-http
    restart: unless-stopped

  # --- Phase 2: Web gateway ---
  nginx:
    image: nginx:1.25-alpine
    container_name: corp-nginx
    hostname: api-gw1
    networks:
      corp-lan:
        ipv4_address: ${NGINX_IP:-172.28.0.25}
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/corp/nginx
    depends_on:
      internal-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      <<: *health-http
    restart: unless-stopped

  # --- Phase 2: Application mocks ---
  internal-app:
    build:
      context: ./docker/app-mock
    container_name: corp-internal-app
    hostname: app1
    networks:
      corp-lan:
        ipv4_address: ${INTERNAL_APP_IP:-172.28.0.26}
    environment:
      ROLE: internal-app
      LOG_ROOT: /var/log/corp/app
    volumes:
      - ./logs/app:/var/log/corp/app
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      <<: *health-http
    restart: unless-stopped

  artifact-registry:
    build:
      context: ./docker/app-mock
    container_name: corp-artifact-registry
    hostname: artifacts1
    networks:
      corp-lan:
        ipv4_address: ${ARTIFACT_REGISTRY_IP:-172.28.0.27}
    environment:
      ROLE: artifact
      LOG_ROOT: /var/log/corp/artifact
    volumes:
      - ./logs/artifact:/var/log/corp/artifact
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  siem-admin:
    build:
      context: ./docker/app-mock
    container_name: corp-siem-admin
    hostname: siem1
    networks:
      corp-lan:
        ipv4_address: ${SIEM_ADMIN_IP:-172.28.0.28}
    environment:
      ROLE: siem
      LOG_ROOT: /var/log/corp/siem
    volumes:
      - ./logs/siem:/var/log/corp/siem
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  hypervisor-console:
    build:
      context: ./docker/app-mock
    container_name: corp-hypervisor-console
    hostname: hv1
    networks:
      corp-lan:
        ipv4_address: ${HYPERVISOR_IP:-172.28.0.29}
    environment:
      ROLE: hypervisor
      LOG_ROOT: /var/log/corp/hypervisor
    volumes:
      - ./logs/hypervisor:/var/log/corp/hypervisor
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  # --- Phase 3: AI, Proxy, Physical, HR, Collaboration, Peripheral ---
  ai-gateway-mock:
    build:
      context: ./simulation/ai_gateway_mock
    container_name: corp-ai-gateway
    hostname: aigw1
    networks:
      corp-lan:
        ipv4_address: ${AI_GATEWAY_IP:-172.28.0.30}
    volumes:
      - ./logs/ai_gateway:/var/log/corp/ai_gateway
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  proxy-sink:
    build:
      context: ./simulation/proxy_sink
    container_name: corp-proxy-sink
    hostname: proxy1
    networks:
      corp-lan:
        ipv4_address: ${PROXY_SINK_IP:-172.28.0.31}
    volumes:
      - ./logs/proxy:/var/log/corp/proxy
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  cloud-storage-mock:
    build:
      context: ./docker/phase3-sim
    container_name: corp-cloud-storage
    hostname: cloud1
    networks:
      corp-lan:
        ipv4_address: ${CLOUD_STORAGE_IP:-172.28.0.32}
    environment:
      ROLE: cloud
    volumes:
      - ./logs/cloud:/var/log/corp/cloud
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  vault-mock:
    build:
      context: ./docker/phase3-sim
    container_name: corp-vault
    hostname: vault1
    networks:
      corp-lan:
        ipv4_address: ${VAULT_IP:-172.28.0.33}
    environment:
      ROLE: vault
    volumes:
      - ./logs/vault:/var/log/corp/vault
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  mattermost:
    build:
      context: ./docker/phase3-sim
    container_name: corp-mattermost
    hostname: chat1
    networks:
      corp-lan:
        ipv4_address: ${MATTERMOST_IP:-172.28.0.34}
    environment:
      ROLE: mattermost
    volumes:
      - ./logs/mattermost:/var/log/corp/mattermost
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  cups:
    build:
      context: ./docker/phase3-sim
    container_name: corp-cups
    hostname: print1
    networks:
      corp-lan:
        ipv4_address: ${CUPS_IP:-172.28.0.35}
    environment:
      ROLE: cups
    volumes:
      - ./logs/cups:/var/log/corp/cups
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  badge-api:
    build:
      context: ./simulation/badge_api
    container_name: corp-badge-api
    hostname: badge1
    networks:
      corp-lan:
        ipv4_address: ${BADGE_API_IP:-172.28.0.36}
    volumes:
      - ./logs/badge:/var/log/corp/badge
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  hris-mock:
    build:
      context: ./simulation/hris_mock
    container_name: corp-hris
    hostname: hris1
    networks:
      corp-lan:
        ipv4_address: ${HRIS_MOCK_IP:-172.28.0.37}
    volumes:
      - ./logs/hris:/var/log/corp/hris
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  suitecrm-mock:
    build:
      context: ./docker/phase3-sim
    container_name: corp-suitecrm
    hostname: crm1
    networks:
      corp-lan:
        ipv4_address: ${SUITECRM_IP:-172.28.0.38}
    environment:
      ROLE: suitecrm
    volumes:
      - ./logs/suitecrm:/var/log/corp/suitecrm
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  wiki-mock:
    build:
      context: ./docker/phase3-sim
    container_name: corp-wiki
    hostname: wiki1
    networks:
      corp-lan:
        ipv4_address: ${WIKI_MOCK_IP:-172.28.0.39}
    environment:
      ROLE: wiki
    volumes:
      - ./logs/wiki:/var/log/corp/wiki
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  dlp-mock:
    build:
      context: ./docker/phase3-sim
    container_name: corp-dlp
    hostname: dlp1
    networks:
      corp-lan:
        ipv4_address: ${DLP_MOCK_IP:-172.28.0.40}
    environment:
      ROLE: dlp
    volumes:
      - ./logs/dlp:/var/log/corp/dlp
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped

  activity-generator:
    build:
      context: ./docker/phase3-sim
    container_name: corp-activity-generator
    hostname: activity1
    networks:
      corp-lan:
        ipv4_address: ${ACTIVITY_GEN_IP:-172.28.0.41}
    environment:
      ROLE: activity
    volumes:
      - ./logs/activity:/var/log/corp/activity
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      <<: *health-http
    restart: unless-stopped
