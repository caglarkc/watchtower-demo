services:
  watchtower:
    build: .
    image: watchtower:local
    container_name: watchtower
    env_file:
      - .env.example
    environment:
      WATCHTOWER_DATABASE_PATH: /data/watchtower.db
      WATCHTOWER_BACKUP_DIR: /backups
    volumes:
      - watchtower_data:/data
      - watchtower_backups:/backups
      # Optional: mount closed-network log lab (read-only)
      - ./server-stack/logs:/lab/server-stack/logs:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wt", "health", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  watchtower_data:
  watchtower_backups:
